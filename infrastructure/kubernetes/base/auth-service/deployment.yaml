apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: auth-service
          image: smart-irrigation/auth-service:latest
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-secrets
                  key: DATABASE_URL
            - name: AUTO_CREATE_SCHEMA
              value: "false"
            - name: ENSURE_CORE_AUTH_SCHEMA
              value: "false"
            - name: SEED_DEFAULT_USERS_ON_STARTUP
              value: "false"
            - name: ENSURE_BOOTSTRAP_AUTHORITY
              value: "true"
            - name: AUTHORITY_BOOTSTRAP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: AUTHORITY_BOOTSTRAP_USERNAME
            - name: AUTHORITY_BOOTSTRAP_EMAIL
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: AUTHORITY_BOOTSTRAP_EMAIL
            - name: AUTHORITY_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: AUTHORITY_BOOTSTRAP_PASSWORD
            - name: AUTHORITY_BOOTSTRAP_FULL_NAME
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: AUTHORITY_BOOTSTRAP_FULL_NAME
            - name: AUTHORITY_BOOTSTRAP_SCHEME_IDS
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: AUTHORITY_BOOTSTRAP_SCHEME_IDS
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: JWT_SECRET_KEY
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: REDIS_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
