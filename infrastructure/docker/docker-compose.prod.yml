# Production Docker Compose override
# Use with:
#   docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml up -d

x-prod-config: &prod-config
  CONFIG_ENABLED: "true"
  CONFIG_SERVER_URL: "http://config_server:8010"
  CONFIG_PROFILE: "production"
  CONFIG_TIMEOUT_SEC: "5"
  CONFIG_FAIL_FAST: "true"
  ENVIRONMENT: "production"
  DEBUG: "false"

services:
  config_server:
    env_file:
      - ${CONFIG_ENV_FILE:-.env.production}
    environment:
      HOST: "0.0.0.0"
      PORT: "8010"
      ENVIRONMENT: "production"
      DEBUG: "false"
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  gateway:
    environment:
      <<: *prod-config
      CONFIG_SERVICE_NAME: "gateway"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS in .env.production}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  web:
    build:
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?Set NEXT_PUBLIC_API_BASE_URL in .env.production}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?Set NEXT_PUBLIC_API_BASE_URL in .env.production}
      NODE_ENV: "production"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  auth_service:
    environment:
      <<: *prod-config
      CONFIG_SERVICE_NAME: "auth_service"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  irrigation_service:
    environment:
      <<: *prod-config
      CONFIG_SERVICE_NAME: "irrigation_service"
      STRICT_LIVE_DATA: ${STRICT_LIVE_DATA:-true}
      ML_ONLY_MODE: ${ML_ONLY_MODE:-false}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  forecasting_service:
    environment:
      <<: *prod-config
      CONFIG_SERVICE_NAME: "forecasting_service"
      STRICT_LIVE_DATA: ${STRICT_LIVE_DATA:-true}
      ML_ONLY_MODE: ${ML_ONLY_MODE:-false}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G

  optimize_service:
    environment:
      <<: *prod-config
      CONFIG_SERVICE_NAME: "optimize_service"
      APP_ENV: "production"
      APP_DEBUG: "false"
      STRICT_LIVE_DATA: ${STRICT_LIVE_DATA:-true}
      ML_ONLY_MODE: ${ML_ONLY_MODE:-false}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G

  iot_service:
    environment:
      <<: *prod-config
      CONFIG_SERVICE_NAME: "iot_service"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  crop_health_and_water_stress_detection:
    environment:
      <<: *prod-config
      CONFIG_SERVICE_NAME: "crop_health_and_water_stress_detection"
      STRICT_LIVE_DATA: ${STRICT_LIVE_DATA:-true}
      ML_ONLY_MODE: ${ML_ONLY_MODE:-false}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G

  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env.production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env.production}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  influxdb:
    environment:
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:?Set INFLUXDB_ADMIN_PASSWORD in .env.production}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:?Set INFLUXDB_TOKEN in .env.production}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  grafana:
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?Set GF_SECURITY_ADMIN_PASSWORD in .env.production}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
