# Smart Irrigation System - Docker Compose (Local E2E)
#
# Run from the project root:  make dev
# The root .env file is the single source of truth for all configuration.
# The config_server loads .env and distributes settings to every service at startup.

services:
  config_server:
    build: ../../services/config_server
    env_file: ../../.env
    environment:
      - HOST=0.0.0.0
      - PORT=8010
    ports:
      - "8010:8010"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  gateway:
    build: ../../services/gateway_service
    environment:
      - CONFIG_ENABLED=true
      - CONFIG_SERVER_URL=http://config_server:8010
      - CONFIG_PROFILE=docker
      - CONFIG_SERVICE_NAME=gateway
      - CONFIG_TIMEOUT_SEC=3
      - CONFIG_FAIL_FAST=false
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:8005,http://127.0.0.1:8005,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "8000:8000"
    depends_on:
      config_server:
        condition: service_healthy
      auth_service:
        condition: service_started
      irrigation_service:
        condition: service_started
      forecasting_service:
        condition: service_started
      optimize_service:
        condition: service_started
      iot_service:
        condition: service_started
      crop_health_and_water_stress_detection:
        condition: service_started
      web:
        condition: service_started
    networks:
      - smart-irrigation
    restart: unless-stopped

  web:
    build:
      context: ../../web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "${WEB_HOST_PORT:-80}:3000"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  auth_service:
    build: ../../services/auth_service
    environment:
      - CONFIG_ENABLED=true
      - CONFIG_SERVER_URL=http://config_server:8010
      - CONFIG_PROFILE=docker
      - CONFIG_SERVICE_NAME=auth_service
      - CONFIG_TIMEOUT_SEC=3
      - CONFIG_FAIL_FAST=false
    depends_on:
      config_server:
        condition: service_healthy
      postgres:
        condition: service_started
    ports:
      - "8001:8001"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  irrigation_service:
    build: ../../services/irrigation_service
    environment:
      - CONFIG_ENABLED=true
      - CONFIG_SERVER_URL=http://config_server:8010
      - CONFIG_PROFILE=docker
      - CONFIG_SERVICE_NAME=irrigation_service
      - CONFIG_TIMEOUT_SEC=3
      - CONFIG_FAIL_FAST=false
    depends_on:
      config_server:
        condition: service_healthy
      postgres:
        condition: service_started
      auth_service:
        condition: service_started
      mosquitto:
        condition: service_started
    ports:
      - "8002:8002"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  forecasting_service:
    build: ../../services/forecasting_service
    environment:
      - CONFIG_ENABLED=true
      - CONFIG_SERVER_URL=http://config_server:8010
      - CONFIG_PROFILE=docker
      - CONFIG_SERVICE_NAME=forecasting_service
      - CONFIG_TIMEOUT_SEC=3
      - CONFIG_FAIL_FAST=false
    depends_on:
      config_server:
        condition: service_healthy
      postgres:
        condition: service_started
      auth_service:
        condition: service_started
    ports:
      - "8003:8003"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  optimize_service:
    build: ../../services/optimize_service
    environment:
      - CONFIG_ENABLED=true
      - CONFIG_SERVER_URL=http://config_server:8010
      - CONFIG_PROFILE=docker
      - CONFIG_SERVICE_NAME=optimize_service
      - CONFIG_TIMEOUT_SEC=3
      - CONFIG_FAIL_FAST=false
    depends_on:
      config_server:
        condition: service_healthy
      postgres:
        condition: service_started
      mosquitto:
        condition: service_started
      auth_service:
        condition: service_started
      irrigation_service:
        condition: service_started
      forecasting_service:
        condition: service_started
      crop_health_and_water_stress_detection:
        condition: service_started
    ports:
      - "8004:8004"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  iot_service:
    build: ../../services/iot_service
    environment:
      - CONFIG_ENABLED=true
      - CONFIG_SERVER_URL=http://config_server:8010
      - CONFIG_PROFILE=docker
      - CONFIG_SERVICE_NAME=iot_service
      - CONFIG_TIMEOUT_SEC=3
      - CONFIG_FAIL_FAST=false
    depends_on:
      config_server:
        condition: service_healthy
      influxdb:
        condition: service_started
      mosquitto:
        condition: service_started
      irrigation_service:
        condition: service_started
    ports:
      - "8006:8006"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  crop_health_and_water_stress_detection:
    build: ../../services/crop_health_and_water_stress_detection
    environment:
      - CONFIG_ENABLED=true
      - CONFIG_SERVER_URL=http://config_server:8010
      - CONFIG_PROFILE=docker
      - CONFIG_SERVICE_NAME=crop_health_and_water_stress_detection
      - CONFIG_TIMEOUT_SEC=3
      - CONFIG_FAIL_FAST=false
    depends_on:
      config_server:
        condition: service_healthy
      mosquitto:
        condition: service_started
      auth_service:
        condition: service_started
    ports:
      - "8007:8007"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-aca_o_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-aca_o_password}
      - POSTGRES_DB=${POSTGRES_DB:-aca_o_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smart-irrigation
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - smart-irrigation
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7-alpine
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-smart-irrigation}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-sensors}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-dev-token-smart-irrigation}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - smart-irrigation
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - smart-irrigation
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../../platform/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - smart-irrigation
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../platform/observability/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - smart-irrigation
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.53
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - smart-irrigation
    restart: unless-stopped

networks:
  smart-irrigation:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  influxdb_data:
  mosquitto_data:
  mosquitto_log:
  prometheus_data:
  grafana_data:
