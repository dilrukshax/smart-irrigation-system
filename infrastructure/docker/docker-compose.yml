# Smart Irrigation System - Docker Compose (Local E2E)

services:
  config_server:
    build: ../../services/config_server
    environment:
      - HOST=0.0.0.0
      - PORT=8010
    ports:
      - "8010:8010"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  gateway:
    build: ../../services/gateway_service
    environment:
      - CONFIG_ENABLED=true
      - CONFIG_SERVER_URL=http://config_server:8010
      - CONFIG_PROFILE=docker
      - CONFIG_SERVICE_NAME=gateway
      - CONFIG_TIMEOUT_SEC=3
      - CONFIG_FAIL_FAST=false
    ports:
      - "8000:8000"
    depends_on:
      - config_server
      - auth_service
      - irrigation_service
      - forecasting_service
      - optimize_service
      - iot_service
      - crop_health_and_water_stress_detection
      - web
    networks:
      - smart-irrigation
    restart: unless-stopped

  web:
    build: ../../web
    ports:
      - "8005:80"
    networks:
      - smart-irrigation
    restart: unless-stopped

  auth_service:
    build: ../../services/auth_service
    environment:
      - CONFIG_ENABLED=true
      - CONFIG_SERVER_URL=http://config_server:8010
      - CONFIG_PROFILE=docker
      - CONFIG_SERVICE_NAME=auth_service
      - CONFIG_TIMEOUT_SEC=3
      - CONFIG_FAIL_FAST=false
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=8001
      - DATABASE_URL=postgresql://aca_o_user:aca_o_password@postgres:5432/aca_o_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-me}
    depends_on:
      - config_server
      - postgres
    ports:
      - "8001:8001"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  irrigation_service:
    build: ../../services/irrigation_service
    environment:
      - CONFIG_ENABLED=true
      - CONFIG_SERVER_URL=http://config_server:8010
      - CONFIG_PROFILE=docker
      - CONFIG_SERVICE_NAME=irrigation_service
      - CONFIG_TIMEOUT_SEC=3
      - CONFIG_FAIL_FAST=false
      - ENVIRONMENT=development
      - DEBUG=true
      - PORT=8002
      - AUTH_SERVICE_URL=http://auth_service:8001
      - DATABASE_URL=postgresql://aca_o_user:aca_o_password@postgres:5432/aca_o_db
      - FORECASTING_SERVICE_URL=http://forecasting_service:8003
      - CROP_HEALTH_SERVICE_URL=http://crop_health_and_water_stress_detection:8007
      - OPTIMIZATION_SERVICE_URL=http://optimize_service:8004
      - IOT_SERVICE_URL=http://iot_service:8006
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    depends_on:
      - config_server
      - postgres
      - auth_service
      - mosquitto
    ports:
      - "8002:8002"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  forecasting_service:
    build: ../../services/forecasting_service
    environment:
      - CONFIG_ENABLED=true
      - CONFIG_SERVER_URL=http://config_server:8010
      - CONFIG_PROFILE=docker
      - CONFIG_SERVICE_NAME=forecasting_service
      - CONFIG_TIMEOUT_SEC=3
      - CONFIG_FAIL_FAST=false
      - ENVIRONMENT=development
      - DEBUG=true
      - PORT=8003
      - STRICT_LIVE_DATA=false
      - ML_ONLY_MODE=false
      - AUTH_SERVICE_URL=http://auth_service:8001
      - DATABASE_URL=postgresql://aca_o_user:aca_o_password@postgres:5432/aca_o_db
    depends_on:
      - config_server
      - postgres
      - auth_service
    ports:
      - "8003:8003"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  optimize_service:
    build: ../../services/optimize_service
    environment:
      - CONFIG_ENABLED=true
      - CONFIG_SERVER_URL=http://config_server:8010
      - CONFIG_PROFILE=docker
      - CONFIG_SERVICE_NAME=optimize_service
      - CONFIG_TIMEOUT_SEC=3
      - CONFIG_FAIL_FAST=false
      - APP_ENV=development
      - APP_DEBUG=true
      - APP_PORT=8004
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=aca_o_user
      - DB_PASSWORD=aca_o_password
      - DB_NAME=aca_o_db
      - DB_SSLMODE=disable
      - IRRIGATION_SERVICE_URL=http://irrigation_service:8002
      - FORECASTING_SERVICE_URL=http://forecasting_service:8003
      - CROP_HEALTH_SERVICE_URL=http://crop_health_and_water_stress_detection:8007
      - AUTH_SERVICE_URL=http://auth_service:8001
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    depends_on:
      - config_server
      - postgres
      - mosquitto
      - auth_service
      - irrigation_service
      - forecasting_service
      - crop_health_and_water_stress_detection
    ports:
      - "8004:8004"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  iot_service:
    build: ../../services/iot_service
    environment:
      - CONFIG_ENABLED=true
      - CONFIG_SERVER_URL=http://config_server:8010
      - CONFIG_PROFILE=docker
      - CONFIG_SERVICE_NAME=iot_service
      - CONFIG_TIMEOUT_SEC=3
      - CONFIG_FAIL_FAST=false
      - ENVIRONMENT=development
      - DEBUG=true
      - PORT=8006
      - DATABASE_URL=${DATABASE_URL:-postgresql://aca_o_user:aca_o_password@postgres:5432/aca_o_db}
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-dev-token-smart-irrigation}
      - INFLUXDB_ORG=smart-irrigation
      - INFLUXDB_BUCKET=sensors
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - DEVICE_API_KEYS=${DEVICE_API_KEYS:-}
      - IRRIGATION_SERVICE_URL=http://irrigation_service:8002
      - DEVICE_FIELD_MAP=${DEVICE_FIELD_MAP:-}
    depends_on:
      - config_server
      - influxdb
      - mosquitto
      - irrigation_service
    ports:
      - "8006:8006"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  crop_health_and_water_stress_detection:
    build: ../../services/crop_health_and_water_stress_detection
    environment:
      - CONFIG_ENABLED=true
      - CONFIG_SERVER_URL=http://config_server:8010
      - CONFIG_PROFILE=docker
      - CONFIG_SERVICE_NAME=crop_health_and_water_stress_detection
      - CONFIG_TIMEOUT_SEC=3
      - CONFIG_FAIL_FAST=false
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=8007
      - ENVIRONMENT=development
      - AUTH_SERVICE_URL=http://auth_service:8001
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    depends_on:
      - config_server
      - mosquitto
      - auth_service
    ports:
      - "8007:8007"
    networks:
      - smart-irrigation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    networks:
      - smart-irrigation
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=aca_o_user
      - POSTGRES_PASSWORD=aca_o_password
      - POSTGRES_DB=aca_o_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smart-irrigation
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - smart-irrigation
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7-alpine
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=smart-irrigation
      - DOCKER_INFLUXDB_INIT_BUCKET=sensors
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=dev-token-smart-irrigation
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - smart-irrigation
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - smart-irrigation
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../../platform/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - smart-irrigation
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../platform/observability/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - smart-irrigation
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.53
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - smart-irrigation
    restart: unless-stopped

networks:
  smart-irrigation:
    driver: bridge

volumes:
  mongo_data:
  postgres_data:
  redis_data:
  influxdb_data:
  mosquitto_data:
  mosquitto_log:
  prometheus_data:
  grafana_data:
