# API Gateway Configuration
# NGINX reverse proxy for all services (Docker runtime)

upstream auth_service {
    server auth_service:8001;
}

upstream irrigation_service {
    server irrigation_service:8002;
}

upstream forecasting_service {
    server forecasting_service:8003;
}

upstream optimization_service {
    server optimize_service:8004;
}

upstream iot_service {
    server iot_service:8006;
}

upstream crop_health_service {
    server crop_health_and_water_stress_detection:8007;
}

upstream iot_service {
    server iot-service:8006;
}

upstream web_frontend {
    server web:80;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location /health {
        return 200 '{"status": "healthy", "service": "api-gateway"}';
        add_header Content-Type application/json;
    }

    location / {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/v1/auth/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://auth_service/api/v1/auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location = /api/v1/auth {
        return 301 /api/v1/auth/;
    }

    location /api/v1/admin/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://auth_service/api/v1/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/v1/admin {
        return 301 /api/v1/admin/;
    }

    location /api/v1/irrigation/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://irrigation_service/api/v1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /api/v1/irrigation/health {
        proxy_pass http://irrigation_service/health;
    }

    location = /api/v1/irrigation {
        return 301 /api/v1/irrigation/;
    }

    location /api/v1/iot/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://forecasting_service/api/v1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /api/v1/iot/health {
        proxy_pass http://iot_service/health;
    }

    location = /api/v1/iot {
        return 301 /api/v1/iot/;
    }

    location /api/v1/crop-health/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://optimization_service/api/v1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # IoT Telemetry Service API
    location /api/v1/iot {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://iot_service/api/v1/iot;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Service health endpoints (for monitoring)
    location /services/health {
        location /services/health/auth {
            proxy_pass http://auth_service/health;
        }
        location /services/health/irrigation {
            proxy_pass http://irrigation_service/health;
        }
        location /services/health/forecasting {
            proxy_pass http://forecasting_service/health;
        }
        location /services/health/optimization {
            proxy_pass http://optimization_service/health;
        }
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
