# API Gateway Configuration - LOCAL DEVELOPMENT

upstream auth_service {
    server 127.0.0.1:8001;
}

upstream irrigation_service {
    server 127.0.0.1:8002;
}

upstream forecasting_service {
    server 127.0.0.1:8003;
}

upstream optimization_service {
    server 127.0.0.1:8004;
}

upstream iot_service {
    server 127.0.0.1:8006;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 8000;
    server_name localhost;

    add_header 'Access-Control-Allow-Origin' $http_origin always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $http_origin;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
    }

    location /health {
        return 200 '{"status": "healthy", "service": "api-gateway"}';
        add_header Content-Type application/json;
    }

    location /api/v1/auth/ {
        limit_req zone=api_limit burst=20 nodelay;
        rewrite ^/api/v1/auth/(.*)$ /api/auth/$1 break;
        proxy_pass http://auth_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /api/v1/auth/health { proxy_pass http://auth_service/health; }
    location = /api/v1/auth { return 301 /api/v1/auth/; }

    location /api/v1/admin/ {
        limit_req zone=api_limit burst=10 nodelay;
        rewrite ^/api/v1/admin/(.*)$ /api/admin/$1 break;
        proxy_pass http://auth_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /api/v1/admin { return 301 /api/v1/admin/; }

    location /api/v1/irrigation/ {
        limit_req zone=api_limit burst=30 nodelay;
        rewrite ^/api/v1/irrigation/(.*)$ /api/v1/$1 break;
        proxy_pass http://irrigation_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /api/v1/irrigation/health { proxy_pass http://irrigation_service/health; }
    location = /api/v1/irrigation { return 301 /api/v1/irrigation/; }

    # Forecasting Service API
    location /api/v1/forecast {
        limit_req zone=api_limit burst=20 nodelay;
        rewrite ^/api/v1/iot/(.*)$ /api/v1/iot/$1 break;
        proxy_pass http://iot_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /api/v1/iot/health { proxy_pass http://iot_service/health; }
    location = /api/v1/iot { return 301 /api/v1/iot/; }

    location /api/v1/crop-health/ {
        limit_req zone=api_limit burst=20 nodelay;
        rewrite ^/api/v1/crop-health/(.*)$ /api/v1/crop-health/$1 break;
        proxy_pass http://crop_health_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /api/v1/crop-health/health { proxy_pass http://crop_health_service/health; }
    location = /api/v1/crop-health { return 301 /api/v1/crop-health/; }

    # IoT Telemetry Service API
    location /api/v1/iot {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://iot_service/api/v1/iot;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Service health endpoints
    location /services/health/auth {
        proxy_pass http://auth_service/health;
    }
    location = /api/v1/forecast/weather { return 301 /api/v1/forecast/weather/; }

    location /api/v1/forecast/v2/ {
        limit_req zone=api_limit burst=20 nodelay;
        rewrite ^/api/v1/forecast/v2/(.*)$ /api/v2/$1 break;
        proxy_pass http://forecasting_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /api/v1/forecast/v2 { return 301 /api/v1/forecast/v2/; }

    location /api/v1/forecast/ {
        limit_req zone=api_limit burst=20 nodelay;
        rewrite ^/api/v1/forecast/(.*)$ /api/v1/$1 break;
        proxy_pass http://forecasting_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /api/v1/forecast/health { proxy_pass http://forecasting_service/health; }
    location = /api/v1/forecast { return 301 /api/v1/forecast/; }

    location /api/v1/optimization/ {
        limit_req zone=api_limit burst=20 nodelay;
        rewrite ^/api/v1/optimization/(.*)$ /f4/$1 break;
        proxy_pass http://optimization_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /api/v1/optimization/health {
        proxy_pass http://optimization_service/health;
    }
    location = /api/v1/optimization { return 301 /api/v1/optimization/; }

    location /services/health/auth { proxy_pass http://auth_service/health; }
    location /services/health/irrigation { proxy_pass http://irrigation_service/health; }
    location /services/health/forecasting { proxy_pass http://forecasting_service/health; }
    location /services/health/optimization { proxy_pass http://optimization_service/health; }
    location /services/health/iot { proxy_pass http://iot_service/health; }
    location /services/health/crop-health { proxy_pass http://crop_health_service/health; }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        return 500 '{"error": "Service unavailable"}';
        add_header Content-Type application/json;
    }
}
